<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060b26"/>
      <stop offset="50%" stop-color="#0d1b40"/>
      <stop offset="100%" stop-color="#020514"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0072F4"/>
      <stop offset="100%" stop-color="#4FC8FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <!-- Subtle decorative grid -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" stroke="#0072F4" stroke-width="1" stroke-opacity="0.05"/>
  <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450" stroke="#0072F4" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Centered Graphic: Glassmorphic Card & Form Icon -->
  <g transform="translate(400, 200)">
    <!-- Glow behind icon -->
    <circle cx="0" cy="0" r="70" fill="#0072F4" opacity="0.15" filter="url(#glow)"/>
    
    <!-- Checklist/Form SVG -->
    <rect x="-45" y="-55" width="90" height="110" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="url(#accentGrad)" stroke-width="2"/>
    <line x1="-25" y1="-30" x2="25" y2="-30" stroke="#4FC8FF" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="-10" x2="15" y2="-10" stroke="#ffffff" stroke-width="2" stroke-opacity="0.8" stroke-linecap="round"/>
    <line x1="-25" y1="10" x2="10" y2="10" stroke="#ffffff" stroke-width="2" stroke-opacity="0.8" stroke-linecap="round"/>
    <line x1="-25" y1="30" x2="20" y2="30" stroke="#ffffff" stroke-width="2" stroke-opacity="0.8" stroke-linecap="round"/>
    
    <!-- Custom Purple check circles -->
    <circle cx="-15" cy="-10" r="3" fill="#0072F4"/>
    <circle cx="-15" cy="10" r="3" fill="#0072F4"/>
    <circle cx="-15" cy="30" r="3" fill="#0072F4"/>
  </g>

  <!-- Big Play Button Overlay -->
  <g transform="translate(400, 225)">
    <circle cx="0" cy="0" r="32" fill="#0072F4" opacity="0.9" filter="url(#glow)"/>
    <polygon points="-8,-12 16,0 -8,12" fill="#ffffff"/>
  </g>
</svg>
